<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑材料 - 问玄东方·商城管理台</title>
  <link rel="stylesheet" href="../shop-admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><h1>问玄东方</h1><p>商城管理台</p></div>
    <nav class="sidebar-nav">
      <div class="nav-group-title">核心功能</div>
      <a href="dashboard.html" class="nav-item" data-dom-id="nav-dashboard"></a>
      <a href="product-list.html" class="nav-item" data-dom-id="nav-product"></a>
      <a href="category-manage.html" class="nav-item" data-dom-id="nav-category"></a>
      <a href="diy-order-list.html" class="nav-item" data-dom-id="nav-diy-order"><span class="nav-badge">3</span></a>
      <a href="material-list.html" class="nav-item active" data-dom-id="nav-material"></a>
      <a href="service-list.html" class="nav-item" data-dom-id="nav-extra-service"></a>
      <div class="nav-group-title">交易管理</div>
      <a href="order-list.html" class="nav-item" data-dom-id="nav-order"><span class="nav-badge">12</span></a>
      <a href="logistics.html" class="nav-item" data-dom-id="nav-logistics"></a>
      <a href="return-list.html" class="nav-item" data-dom-id="nav-return"><span class="nav-badge">2</span></a>
      <div class="nav-group-title">运营</div>
      <a href="report.html" class="nav-item" data-dom-id="nav-report"></a>
      <a href="settings.html" class="nav-item" data-dom-id="nav-settings"></a>
    </nav>
    <div class="sidebar-footer"><a href="../login.html" style="color:rgba(232,222,212,0.5);font-size:12px;">退出登录</a></div>
  </aside>
  <main class="main-content">
    <header class="top-header">
      <div class="breadcrumb">商城管理台 / <a href="material-list.html" data-dom-id="back">材料库</a> / <span>编辑材料</span></div>
      <div class="header-right"><div class="header-user"><div class="header-avatar">管</div><span>管理员</span></div></div>
    </header>
    <div class="page-content">
      <div class="flex-between mb-24">
        <h1 class="page-title" style="margin-bottom:0;">编辑材料</h1>
        <a href="material-list.html" class="btn btn-outline">返回列表</a>
      </div>

      <div class="card">
        <div class="card-header"><h3>材料信息</h3></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label>材料名称 <span class="required">*</span></label>
              <input type="text" class="form-control" value="小叶紫檀主珠" placeholder="请输入材料名称" aria-label="请输入材料名称">
            </div>
            <div class="form-group">
              <label>分类 <span class="required">*</span></label>
              <select class="form-control">
                <option>主珠</option><option>配珠</option><option>佛头</option><option>配饰</option><option>配件</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>材质</label>
            <input type="text" class="form-control" value="小叶紫檀" placeholder="请输入材质" aria-label="请输入材质">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>尺寸</label>
              <input type="text" class="form-control" value="8mm" placeholder="如 8mm、12mm" aria-label="如 8mm、12mm">
            </div>
            <div class="form-group">
              <label>形状</label>
              <select class="form-control">
                <option>圆珠</option><option>扁珠</option><option>桶珠</option><option>算盘子</option><option>其他</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>颜色描述</label>
            <input type="text" class="form-control" value="深紫红色，棕眼细密" placeholder="请描述颜色特征" aria-label="请描述颜色特征">
          </div>
          <div class="form-group">
            <label>颜色预览</label>
            <div class="flex items-center flex-gap-16">
              <span class="color-swatch-lg" style="background:#3D1C0A;"></span>
              <input type="color" value="#3D1C0A" style="width:60px;height:40px;border:none;cursor:pointer;" aria-label="输入">
              <span class="text-sm text-muted">选择或输入色值</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>单价 <span class="required">*</span></label>
              <input type="number" class="form-control" value="12.00" step="0.01" placeholder="请输入单价" aria-label="请输入单价">
            </div>
            <div class="form-group">
              <label>成本价</label>
              <input type="number" class="form-control" value="5.00" step="0.01" placeholder="请输入成本价" aria-label="请输入成本价">
            </div>
          </div>
          <div class="form-group">
            <label>库存数量 <span class="required">*</span></label>
            <input type="number" class="form-control" value="560" placeholder="请输入库存数量" aria-label="请输入库存数量">
          </div>

          <div class="divider"></div>

          <!-- Supplier Info -->
          <div class="card-header" style="padding:0 0 16px;border:none;"><h3>供应商信息</h3></div>
          <div class="form-row">
            <div class="form-group">
              <label>供应商名称</label>
              <input type="text" class="form-control" value="莆田佛珠材料商行" placeholder="请输入供应商名称" aria-label="请输入供应商名称">
            </div>
            <div class="form-group">
              <label>联系方式</label>
              <input type="text" class="form-control" value="159****8888" placeholder="请输入联系方式" aria-label="请输入联系方式">
            </div>
          </div>

          <div class="divider"></div>

          <!-- Image Upload -->
          <div class="form-group">
            <label>材料图片</label>
            <div class="upload-grid" style="grid-template-columns:repeat(4,1fr);">
              <div class="upload-box filled">
                <div class="img-placeholder" style="width:100%;height:100%;border-radius:6px;">已上传</div>
              </div>
              <div class="upload-box filled">
                <div class="img-placeholder" style="width:100%;height:100%;border-radius:6px;">已上传</div>
              </div>
              <div class="upload-box">+</div>
              <div class="upload-box">+</div>
            </div>
            <div class="form-hint">建议上传多角度图片，方便用户查看</div>
          </div>
        </div>
      </div>

      <div class="flex-between mt-24">
        <a href="material-list.html" class="btn btn-outline">取消</a>
        <div class="btn-group">
          <button class="btn btn-outline">保存草稿</button>
          <button class="btn btn-primary">保存</button>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
