<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 问玄东方·商城管理台</title>
  <link rel="stylesheet" href="shop-admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1>问玄东方</h1>
        <p>商城管理台</p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label>手机号</label>
          <input type="tel" class="form-control" placeholder="请输入管理员手机号" maxlength="11" aria-label="请输入管理员手机号">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" class="form-control" placeholder="请输入登录密码" aria-label="请输入登录密码">
        </div>
        <div class="flex-between" style="margin-bottom: 24px;">
          <label style="display:flex;align-items:center;gap:6px;color:rgba(232,222,212,0.5);font-size:12px;cursor:pointer;">
            <input type="checkbox" class="checkbox" style="accent-color:#C8A96E;" aria-label="输入"> 记住登录
          </label>
          <a href="#" style="font-size:12px;color:rgba(232,222,212,0.5);">忘记密码</a>
        </div>
        <button class="login-btn" onclick="location.href='pages/dashboard.html'" data-dom-id="cta-login">登 录</button>
        <p style="text-align:center;font-size:12px;color:rgba(232,222,212,0.3);margin-top:20px;">v1.0.0 &copy; 问玄东方</p>
      </div>
    </div>
  </div>
</body>
</html>
