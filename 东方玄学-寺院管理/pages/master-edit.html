  <!-- Content -->
  <main class="content">
    <div class="page-header">
      <div class="page-header-left">
        <div>
          <h2>编辑法师</h2>
          <div class="breadcrumb"><a href="master-list.html">法师管理</a> / 编辑</div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <a href="master-list.html" class="back-link" data-dom-id="back-master-list"
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        返回法师列表
      </a>

      <!-- Basic Info -->
      <div class="card mb-24">
        <div class="card-header"><h3>基本信息</h3></div>
        <div class="card-body">
          <div class="flex gap-20">
            <!-- Avatar -->
            <div>
              <label class="form-label">头像</label>
              <div class="avatar-upload" style="background:#C45A3C15;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span>更换头像</span>
              </div>
            </div>

            <!-- Form Fields -->
            <div style="flex:1;">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">法号 <span class="required">*</span></label>
                  <input type="text" class="form-input" value="智海" aria-label="输入">
                </div>
                <div class="form-group">
                  <label class="form-label">俗名</label>
                  <input type="text" class="form-input" value="陈建华" aria-label="输入">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">职位 <span class="required">*</span></label>
                  <select class="form-select">
                    <option selected>住持</option>
                    <option>监院</option>
                    <option>知客</option>
                    <option>维那</option>
                    <option>典座</option>
                    <option>僧值</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">宗派 <span class="required">*</span></label>
                  <select class="form-select">
                    <option selected>汉传佛教</option>
                    <option>禅宗</option>
                    <option>净土宗</option>
                    <option>天台宗</option>
                    <option>华严宗</option>
                    <option>密宗</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">法师简介</label>
                <textarea class="form-textarea" rows="4">智海法师，灵隐寺住持，深研禅宗经典，尤擅《金刚经》与《六祖坛经》。多年来主持多场大型祈福法会与开光仪式，深受信众爱戴。</textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Specialties -->
      <div class="card mb-24">
        <div class="card-header"><h3>专长标签</h3></div>
        <div class="card-body">
          <div class="tags-container">
            <span class="tag">佛学 <span class="tag-close">&times;</span></span>
            <span class="tag">禅修 <span class="tag-close">&times;</span></span>
            <span class="tag">开光 <span class="tag-close">&times;</span></span>
            <span class="tag">祈福 <span class="tag-close">&times;</span></span>
            <span class="tag-add">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              添加专长
            </span>
          </div>
        </div>
      </div>

      <!-- Service Pricing -->
      <div class="card mb-24">
        <div class="card-header">
          <h3>服务价格</h3>
          <button class="btn btn-sm btn-outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            添加服务
          </button>
        </div>
        <div class="table-wrapper" style="border:none;">
          <table class="price-table">
            <thead>
              <tr>
                <th>服务项目</th>
                <th>基础价格</th>
                <th>高级价格</th>
                <th>时长(分钟)</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>祈福法会</td>
                <td><input type="text" class="form-input" value="¥200" aria-label="输入"></td>
                <td><input type="text" class="form-input" value="¥500" aria-label="输入"></td>
                <td><input type="text" class="form-input" value="60" aria-label="输入"></td>
                <td><button class="btn btn-sm btn-ghost text-danger">删除</button></td>
              </tr>
              <tr>
                <td>开光加持</td>
                <td><input type="text" class="form-input" value="¥168" aria-label="输入"></td>
                <td><input type="text" class="form-input" value="¥388" aria-label="输入"></td>
                <td><input type="text" class="form-input" value="30" aria-label="输入"></td>
                <td><button class="btn btn-sm btn-ghost text-danger">删除</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn btn-outline">取消</button>
        <button class="btn btn-primary">保存修改</button>
        <button class="btn btn-success">提交审核</button>
      </div>
    </div>
  </main>
</body>
