  <!-- Content -->
  <main class="content">
    <div class="page-header">
      <div class="page-header-left">
        <div>
          <h2>寺院管理</h2>
          <div class="breadcrumb">管理寺院基本信息</div>
        </div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary">保存修改</button>
      </div>
    </div>

    <div class="page-body">
      <!-- Basic Info Form -->
      <div class="card mb-24">
        <div class="card-header">
          <h3>基本信息</h3>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">寺院名称 <span class="required">*</span></label>
            <input type="text" class="form-input" value="灵隐寺" aria-label="输入">
          </div>

          <div class="form-group">
            <label class="form-label">寺院地址 <span class="required">*</span></label>
            <input type="text" class="form-input" value="浙江省杭州市西湖区灵隐路法云弄1号" aria-label="输入">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">联系电话 <span class="required">*</span></label>
              <input type="tel" class="form-input" value="0571-87968665" aria-label="输入">
            </div>
            <div class="form-group">
              <label class="form-label">开放时间</label>
              <input type="text" class="form-input" value="每日 07:00 - 18:00" aria-label="输入">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">始建年代</label>
              <input type="text" class="form-input" value="东晋咸和元年（公元326年）" aria-label="输入">
            </div>
            <div class="form-group">
              <label class="form-label">所属宗派</label>
              <select class="form-select">
                <option selected>禅宗</option>
                <option>净土宗</option>
                <option>天台宗</option>
                <option>华严宗</option>
                <option>密宗</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">寺院简介</label>
            <textarea class="form-textarea" rows="4">灵隐寺，又名云林寺，位于浙江省杭州市西湖区灵隐路法云弄1号。背靠北高峰，面朝飞来峰，始建于东晋咸和元年（326年），占地面积约87000平方米。灵隐寺开山祖师为西印度僧人慧理和尚，至今已有约一千七百年历史，是杭州最早的名刹。</textarea>
          </div>
        </div>
      </div>

      <!-- Images -->
      <div class="card mb-24">
        <div class="card-header">
          <h3>寺院图片</h3>
          <span class="text-sm text-muted">建议尺寸 800x600，最多上传8张</span>
        </div>
        <div class="card-body">
          <div class="upload-grid">
            <div class="upload-box has-image" style="background: linear-gradient(135deg, #C8A96E 0%, #A08040 100%);">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
              <span style="color:#fff; font-size:12px;">山门牌匾</span>
            </div>
            <div class="upload-box has-image" style="background: linear-gradient(135deg, #5B8C5A 0%, #3D6040 100%);">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
              <span style="color:#fff; font-size:12px;">大雄宝殿</span>
            </div>
            <div class="upload-box">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              <span>上传图片</span>
            </div>
            <div class="upload-box">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              <span>上传图片</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Map -->
      <div class="card">
        <div class="card-header">
          <h3>寺院位置</h3>
        </div>
        <div class="card-body">
          <div class="map-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <p>地图加载区域（接入地图API后显示）</p>
            <span class="text-sm text-muted">浙江省杭州市西湖区灵隐路法云弄1号</span>
          </div>
        </div>
      </div>
    </div>
