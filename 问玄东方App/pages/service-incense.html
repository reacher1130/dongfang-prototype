<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上香 - 问玄东方</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../colors_and_type.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { max-width: 430px; margin: 0 auto; }
    .filter-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab {
      flex-shrink: 0;
      border-radius: 9999px;
      background: #3A2C25;
      color: #8A7A6A;
      font-size: 12px;
      padding: 6px 18px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .filter-tab.active {
      background: #C45A3C;
      color: #FFFFFF;
    }
    .service-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 16px 16px;
    }
    .service-card {
      background: #2A1E1A;
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .service-card:active {
      border-color: rgba(200,169,110,0.3);
    }
    .card-img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .card-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #F0E6DA;
    }
    .card-rating {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      color: #C8A96E;
      font-weight: 600;
      flex-shrink: 0;
    }
    .card-monk {
      font-size: 13px;
      color: #C5B097;
      margin-top: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: #8A7A6A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .card-price {
      font-size: 15px;
      font-weight: 700;
      color: #C45A3C;
    }
    .card-btn {
      font-size: 12px;
      color: #FFFFFF;
      background: #C45A3C;
      padding: 4px 14px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .card-btn:active {
      background: #D4735A;
    }
  </style>
</head>
<body class="font-sans" style="background-color: #1C1210; color: #F0E6DA; padding-bottom: 20px;">

  <!-- Top Navigation Bar -->
  <div style="position: sticky; top: 0; z-index: 50; display: flex; align-items: center; height: 44px; padding: 0 16px; background: rgba(28,18,16,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(200,169,110,0.08);">
    <a href="home.html"  data-dom-id="back-home" style="cursor: pointer; padding: 4px; display: flex; align-items: center;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="#C8A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div style="flex: 1; text-align: center; font-size: 17px; font-weight: 700; color: #C8A96E; font-family: 'Noto Serif SC', serif;">上香</div>
    <div style="cursor: pointer; padding: 4px; display: flex; align-items: center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="#C8A96E" stroke-width="2"/>
        <path d="M16 16l4 4" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <div class="filter-tab active">全部</div>
    <div class="filter-tab">汉传</div>
    <div class="filter-tab">藏密</div>
    <div class="filter-tab">道教</div>
    <div class="filter-tab">综合</div>
  </div>

  <!-- Service List -->
  <div class="service-list">

    <!-- Card 1: 灵隐寺 - 头香预约 -->
    <div class="service-card">
      <img src="../assets/temple-card-lingyinsi.jpg" alt="灵隐寺" class="card-img">
      <div class="card-body">
        <div class="card-row1">
          <span class="card-title">头香预约</span>
          <span class="card-rating">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#C8A96E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            4.9
          </span>
        </div>
        <div class="card-monk">灵隐寺 · 智海法师</div>
        <div class="card-desc">除夕头香预约名额</div>
        <div class="card-footer">
          <span class="card-price">¥288起</span>
          <a href="booking.html"  class="card-btn" data-dom-id="cta-booking">立即预约</a>
        </div>
      </div>
    </div>

    <!-- Card 2: 白马寺 - 日常上香 -->
    <div class="service-card">
      <img src="../assets/temple-card-baimasi.jpg" alt="白马寺" class="card-img">
      <div class="card-body">
        <div class="card-row1">
          <span class="card-title">日常上香</span>
          <span class="card-rating">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#C8A96E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            4.8
          </span>
        </div>
        <div class="card-monk">白马寺 · 释觉光法师</div>
        <div class="card-desc">在线预约上香时段</div>
        <div class="card-footer">
          <span class="card-price">¥18起</span>
          <a href="booking.html"  class="card-btn" data-dom-id="cta-booking">立即预约</a>
        </div>
      </div>
    </div>

    <!-- Card 3: 少林寺 - 达摩洞上香 -->
    <div class="service-card">
      <img src="../assets/temple-card-shaolinsi.jpg" alt="少林寺" class="card-img">
      <div class="card-body">
        <div class="card-row1">
          <span class="card-title">达摩洞上香</span>
          <span class="card-rating">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#C8A96E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            4.8
          </span>
        </div>
        <div class="card-monk">少林寺 · 释延心法师</div>
        <div class="card-desc">朝拜达摩祖师</div>
        <div class="card-footer">
          <span class="card-price">¥38起</span>
          <a href="booking.html"  class="card-btn" data-dom-id="cta-booking">立即预约</a>
        </div>
      </div>
    </div>

    <!-- Card 4: 法门寺 - 舍利塔上香 -->
    <div class="service-card">
      <img src="../assets/temple-card-famensi.jpg" alt="法门寺" class="card-img">
      <div class="card-body">
        <div class="card-row1">
          <span class="card-title">舍利塔上香</span>
          <span class="card-rating">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#C8A96E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            4.8
          </span>
        </div>
        <div class="card-monk">法门寺 · 释义空法师</div>
        <div class="card-desc">朝拜佛指舍利</div>
        <div class="card-footer">
          <span class="card-price">¥48起</span>
          <a href="booking.html"  class="card-btn" data-dom-id="cta-booking">立即预约</a>
        </div>
      </div>
    </div>

    <!-- Card 5: 青羊宫 - 三清殿上香 -->
    <div class="service-card">
      <img src="../assets/temple-card-qingyanggong.jpg" alt="青羊宫" class="card-img">
      <div class="card-body">
        <div class="card-row1">
          <span class="card-title">三清殿上香</span>
          <span class="card-rating">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#C8A96E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            4.7
          </span>
        </div>
        <div class="card-monk">青羊宫 · 张至顺道长</div>
        <div class="card-desc">道教上香科仪</div>
        <div class="card-footer">
          <span class="card-price">¥28起</span>
          <a href="booking.html"  class="card-btn" data-dom-id="cta-booking">立即预约</a>
        </div>
      </div>
    </div>

    <!-- Card 6: 大昭寺 - 释迦牟尼供香 -->
    <div class="service-card">
      <img src="../assets/temple-card-dazhaosi.jpg" alt="大昭寺" class="card-img">
      <div class="card-body">
        <div class="card-row1">
          <span class="card-title">释迦牟尼供香</span>
          <span class="card-rating">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#C8A96E"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            5.0
          </span>
        </div>
        <div class="card-monk">大昭寺 · 扎西多吉活佛</div>
        <div class="card-desc">大昭寺正殿供香</div>
        <div class="card-footer">
          <span class="card-price">¥68起</span>
          <a href="booking.html"  class="card-btn" data-dom-id="cta-booking">立即预约</a>
        </div>
      </div>
    </div>

  </div>

  <!-- Filter Tab Interaction -->
  <script>
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>

</body>
</html>
