/* ================================================================
   问玄东方App - Brand Design Tokens & Shared Styles
   Red-Gold Traditional Chinese (火土元素) Color Scheme
   ================================================================ */

/* ===== Design Tokens (CSS Custom Properties) ===== */
:root {
  /* Background */
  --color-bg-primary: #1C1210;
  --color-bg-secondary: #2A1E1A;
  --color-bg-tertiary: #3A2C25;
  --color-bg-elevated: #44342C;

  /* Brand */
  --color-brand: #C45A3C;
  --color-brand-light: #D4735A;
  --color-brand-dark: #A64830;

  /* Accent Gold */
  --color-accent: #C8A96E;
  --color-accent-light: #D4BC8A;
  --color-accent-dark: #A88A50;

  /* Cinnabar */
  --color-cinnabar: #B5453A;
  --color-cinnabar-light: #CC5A4F;

  /* Text */
  --color-text-primary: #F0E6DA;
  --color-text-secondary: #C5B097;
  --color-text-tertiary: #8A7A6A;

  /* Border / Divider */
  --color-border: rgba(200, 169, 110, 0.15);
  --color-border-strong: rgba(200, 169, 110, 0.3);
  --color-divider: rgba(200, 169, 110, 0.08);

  /* State */
  --color-state-success: #5B8C5A;
  --color-state-warning: #D4A843;
  --color-state-error: #C45A3C;

  /* Aliases for compatibility */
  --state-success: #5B8C5A;
}

/* ===== Reset & Base ===== */
*,
*::before,
*::after {
  box-sizing: border-box;
}

/* ===== Navigation Bars ===== */

/* Top navigation bar (sticky, frosted glass) */
.top-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  height: 44px;
  padding: 0 16px;
  background: rgba(28, 18, 16, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(200, 169, 110, 0.08);
}

/* Bottom tab navigation bar */
.nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  background: rgba(28, 18, 16, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(200, 169, 110, 0.08);
  padding: 8px 0;
  padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 200;
}

/* ===== Tab Components ===== */

/* Generic tab item (top tab bars) */
.tab-item {
  flex: 1;
  text-align: center;
  padding: 13px 0;
  font-size: 14px;
  color: var(--color-text-tertiary);
  position: relative;
  cursor: pointer;
  transition: color 0.2s;
  white-space: nowrap;
}
.tab-item.active {
  color: var(--color-brand);
  font-weight: 600;
}
.tab-item.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: var(--color-brand);
  border-radius: 2px;
}

/* Tab content panel (show/hide) */
.tab-panel {
  display: none;
}
.tab-panel.active {
  display: block;
}

/* ===== Tag / Category Pill ===== */
.tag-pill {
  flex-shrink: 0;
  border-radius: 9999px;
  background: var(--color-bg-tertiary);
  color: var(--color-text-tertiary);
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s;
  white-space: nowrap;
  display: inline-block;
}
.tag-pill.active {
  background: var(--color-brand);
  color: #FFFFFF;
}

/* ===== Cards ===== */
.card {
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-radius: 12px;
}

/* ===== Scroll Helpers ===== */
.scroll-h {
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.scroll-h::-webkit-scrollbar {
  display: none;
}

.hide-scrollbar {
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.hide-scrollbar::-webkit-scrollbar {
  display: none;
}

/* ===== Filter Panel ===== */
.filter-panel {
  background: var(--color-bg-secondary);
  border-right: 1px solid var(--color-divider);
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filter-panel::-webkit-scrollbar {
  display: none;
}

/* ===== Border Utility ===== */
.border-gold-subtle {
  border: 1px solid rgba(200, 169, 110, 0.15);
}

/* ===== Font Utility ===== */
.serif {
  font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
}

/* ===== Dot Indicators ===== */
.dot-indicator {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--color-text-tertiary);
  transition: width 0.3s ease, border-radius 0.3s ease, background 0.3s ease;
}
.dot-indicator.active {
  width: 18px;
  border-radius: 3px;
  background: var(--color-brand);
}

/* ===== Button Styles ===== */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 24px;
  border-radius: 10px;
  background: var(--color-cinnabar);
  color: #FFFFFF;
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:active {
  background: var(--color-cinnabar-light);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 24px;
  border-radius: 10px;
  background: transparent;
  color: var(--color-accent);
  font-size: 15px;
  font-weight: 600;
  border: 1.5px solid var(--color-accent);
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s;
}
.btn-secondary:active {
  background: rgba(200, 169, 110, 0.1);
}

/* ===== Bottom Action Bar (for detail/profile pages) ===== */
.bottom-action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  background: rgba(28, 18, 16, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--color-border);
}

/* ===== Frosted Glass Utility ===== */
.frosted {
  background: rgba(28, 18, 16, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
