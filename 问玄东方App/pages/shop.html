  <style>
    body {
      max-width: 375px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--color-bg-primary);
      padding-bottom: 80px;
    }

    /* Search bar */
    .search-bar {
      padding: 8px 16px;
    }
    .search-bar input {
      width: 100%;
      height: 36px;
      background: #2A1E1A;
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      padding: 0 16px 0 36px;
      font-size: 13px;
      color: var(--color-text-primary);
      outline: none;
      &:focus-visible { outline: 2px solid #C8A96E; outline-offset: 2px; }
    }
    .search-bar input::placeholder {
      color: var(--color-text-tertiary);
    }
    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Promo banner */
    .promo-banner {
      margin: 0 16px;
      height: 100px;
      border-radius: 12px;
      background: linear-gradient(135deg, #C45A3C 0%, #7A2E1A 60%, #3A1A10 100%);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .promo-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 80% 20%, rgba(200, 169, 110, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 20% 80%, rgba(200, 169, 110, 0.1) 0%, transparent 40%);
      pointer-events: none;
    }
    .promo-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 15L30 10L25 15Z' fill='rgba(200,169,110,0.08)'/%3E%3Cpath d='M10 30L20 35L15 30L20 25Z' fill='rgba(200,169,110,0.06)'/%3E%3Cpath d='M50 30L40 35L45 30L40 25Z' fill='rgba(200,169,110,0.06)'/%3E%3Cpath d='M30 55L25 45L30 50L35 45Z' fill='rgba(200,169,110,0.08)'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    .promo-title {
      font-size: 20px;
      font-weight: 700;
      color: #FFFFFF;
      position: relative;
      z-index: 1;
    }
    .promo-subtitle {
      font-size: 13px;
      color: #C8A96E;
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }
    .promo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 9999px;
      font-size: 12px;
      color: #FFFFFF;
      font-weight: 500;
      cursor: pointer;
      width: fit-content;
      position: relative;
      z-index: 1;
    }

    /* Category icons row */
    .category-row {
      display: flex;
      align-items: flex-start;
      padding: 16px 16px;
      gap: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .category-row::-webkit-scrollbar { display: none; }

    .cat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cat-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s;
    }
    .cat-item.active .cat-icon {
      background: #C45A3C;
    }
    .cat-item:not(.active) .cat-icon {
      background: #2A1E1A;
    }
    .cat-icon svg {
      width: 20px;
      height: 20px;
    }
    .cat-item.active .cat-icon svg {
      stroke: #FFFFFF;
    }
    .cat-item:not(.active) .cat-icon svg {
      stroke: #8A7A6A;
    }
    .cat-label {
      font-size: 11px;
      white-space: nowrap;
    }
    .cat-item.active .cat-label {
      color: #C45A3C;
    }
    .cat-item:not(.active) .cat-label {
      color: #8A7A6A;
    }

    /* Product grid */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px;
    }
    .product-card {
      background: #2A1E1A;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s;
    }
    .product-card:active {
      opacity: 0.85;
    }
    .product-img-wrap {
      position: relative;
      width: 100%;
      height: 160px;
      background: #3A2C25;
      overflow: hidden;
    }
    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-tag {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 2px 8px;
      border-radius: 9999px;
      background: #C45A3C;
      font-size: 10px;
      color: #FFFFFF;
      font-weight: 500;
      z-index: 2;
    }
    .product-info {
      padding: 8px 10px 2px;
    }
    .product-name {
      font-size: 13px;
      color: #F0E6DA;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 10px 10px;
      margin-top: 4px;
    }
    .product-price {
      font-size: 16px;
      font-weight: 700;
      color: #C45A3C;
    }
    .product-sales {
      font-size: 11px;
      color: #8A7A6A;
    }
  </style>
