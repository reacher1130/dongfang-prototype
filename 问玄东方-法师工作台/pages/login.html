<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 法师工作台</title>
  <link rel="stylesheet" href="../master-app.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px 32px;
    }
    .login-logo {
      margin-bottom: 48px;
      text-align: center;
    }
    .login-logo .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--color-accent), var(--color-brand));
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(196, 90, 60, 0.3);
    }
    .login-logo .logo-icon svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      fill: none;
    }
    .login-logo h1 {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: 4px;
    }
    .login-logo .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-top: 8px;
      letter-spacing: 2px;
    }
    .login-form {
      width: 100%;
      max-width: 340px;
    }
    .login-form .form-group {
      margin-bottom: 20px;
    }
    .code-row {
      display: flex;
      gap: 12px;
    }
    .code-row .form-input {
      flex: 1;
    }
    .code-btn {
      width: 100px;
      height: 48px;
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-accent);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .code-btn:active {
      border-color: var(--color-accent);
    }
    .login-btn {
      width: 100%;
      height: 50px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--color-brand), var(--color-brand-dark), #8B3A2A);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: var(--radius-lg);
      border: none;
      cursor: pointer;
      letter-spacing: 2px;
      transition: opacity 0.2s;
      box-shadow: 0 4px 16px rgba(196, 90, 60, 0.3);
    }
    .login-btn:active {
      opacity: 0.85;
    }
    .protocol {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 24px;
    }
    .protocol .checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--color-border);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      cursor: pointer;
    }
    .protocol .checkbox.checked {
      background: var(--color-brand);
      border-color: var(--color-brand);
    }
    .protocol .checkbox svg {
      width: 12px;
      height: 12px;
      stroke: #fff;
      stroke-width: 3;
    }
    .protocol .text {
      font-size: 12px;
      color: var(--color-text-muted);
      line-height: 1.5;
    }
    .protocol .text a {
      color: var(--color-accent);
    }
  </style>
</head>
<body style="background-color: #1C1210; color: #F0E6DA;">
  <div class="app-container">
    <div class="login-page">
      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="20" cy="14" r="6"/>
            <path d="M12 28c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
            <path d="M16 8l4-3 4 3"/>
            <circle cx="20" cy="14" r="2" fill="currentColor"/>
          </svg>
        </div>
        <h1>问玄东方</h1>
        <div class="subtitle">法师工作台</div>
      </div>

      <!-- Form -->
      <div class="login-form">
        <div class="form-group">
          <input type="tel" class="form-input" placeholder="请输入手机号码" maxlength="11" value="138****8888" aria-label="请输入手机号码">
        </div>
        <div class="form-group">
          <div class="code-row">
            <input type="text" class="form-input" placeholder="请输入验证码" maxlength="6" aria-label="请输入验证码">
            <button class="code-btn">获取验证码</button>
          </div>
        </div>
        <a href="workspace.html" class="login-btn" data-dom-id="cta-login" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">登 录</a>

        <div class="protocol">
          <div class="checkbox checked">
            <svg viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3"/></svg>
          </div>
          <div class="text">
            我已阅读并同意 <a href="../../问玄东方App/pages/profile-section.html?view=about">《用户服务协议》</a> 和 <a href="../../问玄东方App/pages/profile-section.html?view=about">《隐私政策》</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
