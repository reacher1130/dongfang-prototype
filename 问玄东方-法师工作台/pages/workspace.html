<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - 法师工作台</title>
  <link rel="stylesheet" href="../master-app.css">
  <style>
    .greeting {
      padding: 24px 16px 16px;
    }
    .greeting .greet-text {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.4;
    }
    .greeting .greet-sub {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: 6px;
    }
    .stats-row {
      display: flex;
      gap: 10px;
      padding: 0 16px;
    }
    .booking-card {
      background: var(--color-card-bg);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin: 10px 16px 0;
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .booking-card .time-block {
      flex-shrink: 0;
      text-align: center;
      min-width: 56px;
    }
    .booking-card .time-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .booking-card .time-period {
      font-size: 11px;
      color: var(--color-text-muted);
    }
    .booking-card .booking-info {
      flex: 1;
      min-width: 0;
    }
    .booking-card .booking-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    .booking-card .booking-user {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 2px;
    }
    .booking-card .booking-status {
      flex-shrink: 0;
    }
  </style>
</head>
<body style="background-color: #1C1210; color: #F0E6DA;">
  <div class="app-container">
    <div class="page">
      <!-- Greeting -->
      <div class="greeting fade-in">
        <div class="greet-text">阿弥陀佛，智海法师</div>
        <div class="greet-sub">今日有 3 个预约待处理，1 个加持任务</div>
      </div>

      <!-- Stats -->
      <div class="stats-row fade-in">
        <div class="stat-card">
          <div class="stat-value">28</div>
          <div class="stat-label">本月预约</div>
        </div>
        <div class="stat-card highlight">
          <div class="stat-value" style="font-size:18px;">¥8,560</div>
          <div class="stat-label">本月收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">98.5%</div>
          <div class="stat-label">好评率</div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions fade-in">
        <a class="quick-action" href="calendar.html" data-dom-id="cta-calendar">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div class="action-label">设置日程</div>
        </a>
        <a class="quick-action" href="#">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12,6 12,12 16,14"/>
            </svg>
          </div>
          <div class="action-label">休息请假</div>
        </a>
        <a class="quick-action" href="profile.html">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="action-label">个人主页</div>
        </a>
        <a class="quick-action" href="earnings.html" data-dom-id="cta-earnings">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
          <div class="action-label">收入提现</div>
        </a>
      </div>

      <a href="media-studio.html" style="display:flex;align-items:center;gap:12px;margin:0 16px 16px;padding:14px;background:#2A1E1A;border:1px solid rgba(200,169,110,.15);border-radius:10px;text-decoration:none;" data-dom-id="cta-media-studio">
        <div style="width:42px;height:42px;border-radius:8px;background:rgba(196,90,60,.15);display:flex;align-items:center;justify-content:center;color:#C45A3C;font-size:20px;">▶</div>
        <div style="flex:1;">
          <div style="font-size:15px;font-weight:600;color:#F0E6DA;">内容与直播</div>
          <div style="font-size:12px;color:#8A7A6A;margin-top:3px;">上传短视频并查看直播能力</div>
        </div>
        <span style="color:#8A7A6A;">›</span>
      </a>

      <!-- Today's Bookings -->
      <div class="section-header">
        <div class="section-title">今日预约</div>
        <a class="section-more" href="blessing-tasks.html" data-dom-id="cta-blessing-tasks">查看全部</a>
      </div>

      <a href="booking-detail.html"  class="booking-card fade-in" data-dom-id="cta-today-booking">
        <div class="time-block">
          <div class="time-text">09:00</div>
          <div class="time-period">10:00</div>
        </div>
        <div class="booking-info">
          <div class="booking-title">祈福法会</div>
          <div class="booking-user">张三 · 灵隐寺大雄宝殿</div>
        </div>
        <div class="booking-status">
          <span class="badge badge-warning">待处理</span>
        </div>
      </a>

      <a href="booking-detail.html"  class="booking-card fade-in" data-dom-id="cta-today-booking">
        <div class="time-block">
          <div class="time-text">14:00</div>
          <div class="time-period">15:00</div>
        </div>
        <div class="booking-info">
          <div class="booking-title">命理咨询</div>
          <div class="booking-user">李四 · 线上视频</div>
        </div>
        <div class="booking-status">
          <span class="badge badge-info">已确认</span>
        </div>
      </a>

      <a href="booking-detail.html"  class="booking-card fade-in" data-dom-id="cta-today-booking">
        <div class="time-block">
          <div class="time-text">16:00</div>
          <div class="time-period">17:00</div>
        </div>
        <div class="booking-info">
          <div class="booking-title">开光加持</div>
          <div class="booking-user">王五 · 灵隐寺</div>
        </div>
        <div class="booking-status">
          <span class="badge badge-warning">待处理</span>
        </div>
      </a>

      <!-- 加持任务入口 -->
      <div style="margin-top: 16px;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 16px;">
          <span style="font-size: 15px; font-weight: 600; color: #F0E6DA;">加持任务</span>
          <a href="blessing-tasks.html" style="font-size: 12px; color: #C8A96E; text-decoration: none;" data-dom-id="cta-blessing-tasks">查看全部 ></a>
        </div>
        <!-- Blessing task card -->
        <a href="blessing-task-detail.html" id="cta-blessing-task-detail" style="display: block; background: #2A1E1A; border-radius: 10px; padding: 12px; text-decoration: none; margin: 0 16px 8px; border: 1px solid #3D2E28;" data-dom-id="cta-blessing-task-detail">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
              <div style="font-size: 13px; font-weight: 600; color: #F0E6DA;">紫檀·静心 · 开光加持</div>
              <div style="font-size: 11px; color: #8A7A6A; margin-top: 4px;">用户·王芳 | 今天 15:00</div>
            </div>
            <span style="font-size: 11px; padding: 3px 8px; border-radius: 6px; background: rgba(196,90,60,0.15); color: #C45A3C; font-weight: 500;">待处理</span>
          </div>
        </a>
      </div>

      <div style="height: 16px;"></div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="bottom-tabs">
      <a class="tab-item active" href="workspace.html" data-dom-id="nav-workspace">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        <span>工作台</span>
      </a>
      <a class="tab-item" href="bookings.html" data-dom-id="nav-bookings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>预约</span>
        <span class="tab-badge">3</span>
      </a>
      <a class="tab-item" href="messages.html" data-dom-id="nav-messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>消息</span>
        <span class="tab-badge">5</span>
      </a>
      <a class="tab-item" href="profile.html" data-dom-id="nav-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>我的</span>
      </a>
    </div>
  </div>
</body>
</html>
