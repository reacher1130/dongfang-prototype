<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 法师工作台</title>
  <link rel="stylesheet" href="../master-app.css">
  <style>
    .settings-group {
      margin: 16px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--color-border);
    }
    .settings-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: var(--color-card-bg);
      border-bottom: 1px solid var(--color-border);
    }
    .settings-item:last-child {
      border-bottom: none;
    }
    .settings-item .setting-info {
      flex: 1;
    }
    .settings-item .setting-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    .settings-item .setting-desc {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .settings-item .setting-icon {
      width: 20px;
      height: 20px;
      stroke: var(--color-text-muted);
      flex-shrink: 0;
    }
    .settings-item .setting-arrow {
      width: 16px;
      height: 16px;
      stroke: var(--color-text-muted);
      flex-shrink: 0;
    }
    .settings-item.danger .setting-title {
      color: var(--color-danger);
    }
    .settings-item.danger .setting-icon {
      stroke: var(--color-danger);
    }
    .logout-btn {
      margin: 16px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(196, 90, 60, 0.3);
      border-radius: var(--radius-lg);
      color: var(--color-danger);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      width: calc(100% - 32px);
      transition: background 0.2s;
    }
    .logout-btn:active {
      background: rgba(196, 90, 60, 0.1);
    }
    .settings-divider {
      height: 8px;
    }
  </style>
</head>
<body style="background-color: #1C1210; color: #F0E6DA;">
  <div class="app-container">
    <div class="page-no-tabs">
      <!-- Top Nav -->
      <div class="top-nav">
        <a class="nav-back" href="profile.html" data-dom-id="back-profile">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15,18 9,12 15,6"/>
          </svg>
        </a>
        <span class="nav-title">设置</span>
      </div>

      <div class="page-content">
        <!-- Toggle Settings -->
        <div class="settings-group fade-in">
          <div class="settings-item">
            <div class="setting-info">
              <div class="setting-title">休息模式</div>
              <div class="setting-desc">开启后将暂停接收新预约</div>
            </div>
            <div class="toggle-switch"></div>
          </div>
          <div class="settings-item">
            <div class="setting-info">
              <div class="setting-title">新预约提醒</div>
              <div class="setting-desc">有新预约时推送通知</div>
            </div>
            <div class="toggle-switch active"></div>
          </div>
          <div class="settings-item">
            <div class="setting-info">
              <div class="setting-title">评价提醒</div>
              <div class="setting-desc">收到新评价时推送通知</div>
            </div>
            <div class="toggle-switch active"></div>
          </div>
          <div class="settings-item">
            <div class="setting-info">
              <div class="setting-title">系统公告</div>
              <div class="setting-desc">接收平台系统公告通知</div>
            </div>
            <div class="toggle-switch active"></div>
          </div>
        </div>

        <!-- Button Settings -->
        <div class="settings-group fade-in">
          <div class="settings-item" style="cursor: pointer;">
            <div class="setting-info">
              <div class="setting-title">修改密码</div>
            </div>
            <svg class="setting-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg>
          </div>
          <div class="settings-item" style="cursor: pointer;">
            <div class="setting-info">
              <div class="setting-title">关于我们</div>
            </div>
            <div style="font-size: 13px; color: var(--color-text-muted); margin-right: 8px;">v1.0.0</div>
            <svg class="setting-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg>
          </div>
        </div>

        <!-- Logout -->
        <button class="logout-btn fade-in">退出登录</button>

        <div style="height: 32px;"></div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.toggle-switch').forEach(toggle => {
      toggle.addEventListener('click', function() {
        this.classList.toggle('active');
      });
    });
  </script>
</body>
</html>
