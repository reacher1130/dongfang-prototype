<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约管理 - 法师工作台</title>
  <link rel="stylesheet" href="../master-app.css">
  <style>
    .booking-list-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin: 10px 16px 0;
      background: var(--color-card-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
    }
    .booking-list-card .blc-avatar {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-full);
      background: var(--color-card-bg-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .booking-list-card .blc-avatar svg {
      width: 22px;
      height: 22px;
      stroke: var(--color-text-muted);
    }
    .booking-list-card .blc-info {
      flex: 1;
      min-width: 0;
    }
    .booking-list-card .blc-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .booking-list-card .blc-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    .booking-list-card .blc-meta {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }
    .booking-list-card .blc-right {
      flex-shrink: 0;
      text-align: right;
    }
    .booking-list-card .blc-amount {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-accent);
    }
    .booking-list-card .blc-status {
      margin-top: 4px;
    }
    .booking-list-card .blc-action {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    .blc-action .btn-tiny {
      padding: 0 12px;
      height: 30px;
      font-size: 12px;
      border-radius: var(--radius-sm);
    }
  </style>
</head>
<body style="background-color: #1C1210; color: #F0E6DA;">
  <div class="app-container">
    <div class="page">
      <!-- Tab Filters -->
      <div class="tab-filters" style="margin-top: 0;">
        <div class="tab-filter active">待处理<span class="filter-count">3</span></div>
        <div class="tab-filter">已确认<span class="filter-count">5</span></div>
        <div class="tab-filter">已完成<span class="filter-count">12</span></div>
        <div class="tab-filter">已取消<span class="filter-count">1</span></div>
      </div>

      <!-- Booking Cards -->
      <div style="padding-top: 10px;">
        <div class="booking-list-card fade-in">
          <div class="blc-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="blc-info">
            <div class="blc-name-row">
              <span class="blc-name">张三</span>
              <span class="badge badge-accent">祈福法会</span>
            </div>
            <div class="blc-meta">2026-06-29 09:00-10:00 · 灵隐寺</div>
            <div class="blc-action">
              <a href="booking-detail.html" class="btn-primary btn-tiny" style="text-decoration:none; color:#fff;" data-dom-id="cta-booking-detail">查看详情</a>
            </div>
          </div>
          <div class="blc-right">
            <div class="blc-amount">¥200</div>
            <div class="blc-status"><span class="badge badge-warning">待处理</span></div>
          </div>
        </div>

        <div class="booking-list-card fade-in">
          <div class="blc-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="blc-info">
            <div class="blc-name-row">
              <span class="blc-name">王五</span>
              <span class="badge badge-brand">开光加持</span>
            </div>
            <div class="blc-meta">2026-06-29 16:00-17:00 · 灵隐寺</div>
            <div class="blc-action">
              <a href="booking-detail.html" class="btn-primary btn-tiny" style="text-decoration:none; color:#fff;" data-dom-id="cta-booking-detail">查看详情</a>
            </div>
          </div>
          <div class="blc-right">
            <div class="blc-amount">¥168</div>
            <div class="blc-status"><span class="badge badge-warning">待处理</span></div>
          </div>
        </div>

        <div class="booking-list-card fade-in">
          <div class="blc-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="blc-info">
            <div class="blc-name-row">
              <span class="blc-name">赵六</span>
              <span class="badge badge-info">命理咨询</span>
            </div>
            <div class="blc-meta">2026-06-30 10:00-11:00 · 线上视频</div>
            <div class="blc-action">
              <a href="booking-detail.html" class="btn-primary btn-tiny" style="text-decoration:none; color:#fff;" data-dom-id="cta-booking-detail">查看详情</a>
            </div>
          </div>
          <div class="blc-right">
            <div class="blc-amount">¥100</div>
            <div class="blc-status"><span class="badge badge-warning">待处理</span></div>
          </div>
        </div>
      </div>

      <div style="height: 16px;"></div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="bottom-tabs">
      <a class="tab-item" href="workspace.html" data-dom-id="nav-workspace">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        <span>工作台</span>
      </a>
      <a class="tab-item active" href="bookings.html" data-dom-id="nav-bookings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>预约</span>
        <span class="tab-badge">3</span>
      </a>
      <a class="tab-item" href="messages.html" data-dom-id="nav-messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>消息</span>
        <span class="tab-badge">5</span>
      </a>
      <a class="tab-item" href="profile.html" data-dom-id="nav-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>我的</span>
      </a>
    </div>
  </div>
</body>
</html>
