<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加持任务详情 - 法师工作台</title>
  <link rel="stylesheet" href="../master-app.css">
  <style>
    .detail-card {
      background: var(--color-card-bg);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin: 12px 16px 0;
      border: 1px solid var(--color-border);
    }
    .detail-card .detail-title {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 10px;
    }
    .detail-card .detail-id {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      font-family: var(--font-mono);
    }
    .user-info-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-info-row .user-detail {
      flex: 1;
    }
    .user-info-row .user-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .user-info-row .user-phone {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: 2px;
    }
    .service-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .service-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .service-row .s-label {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    .service-row .s-value {
      font-size: 13px;
      color: var(--color-text-primary);
      font-weight: 500;
    }
    .service-row .s-value.price {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-accent);
    }
    .bracelet-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bracelet-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--color-card-bg-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--color-border);
    }
    .bracelet-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--color-accent);
    }
    .bracelet-detail {
      flex: 1;
    }
    .bracelet-detail .bd-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .bracelet-detail .bd-meta {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 2px;
    }
    .bracelet-detail .bd-price {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-accent);
      margin-top: 4px;
    }
    .detail-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      padding: 16px 16px 8px;
    }
    .action-bar {
      display: flex;
      gap: 12px;
      padding: 16px;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
    }
    .action-bar .btn-start {
      flex: 1;
      height: 48px;
      background: linear-gradient(135deg, var(--color-brand), #8B3A2A);
      border-radius: var(--radius-lg);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      letter-spacing: 1px;
    }
    .action-bar .btn-complete {
      flex: 1;
      height: 48px;
      background: linear-gradient(135deg, #5B8C5A, #3D6B3C);
      border-radius: var(--radius-lg);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      letter-spacing: 1px;
    }
    .action-bar .btn-upload {
      flex: 1;
      height: 48px;
      background: transparent;
      border-radius: var(--radius-lg);
      color: var(--color-text-secondary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--color-border);
    }
    .upload-area {
      background: var(--color-bg-secondary);
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover {
      border-color: var(--color-accent);
    }
    .upload-area svg {
      width: 36px;
      height: 36px;
      stroke: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .upload-area .upload-text {
      font-size: 13px;
      color: var(--color-text-muted);
    }
    .upload-area .upload-hint {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-top: 4px;
      opacity: 0.7;
    }
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
    }
    .success-overlay.show {
      display: flex;
    }
    .success-overlay .success-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(91, 140, 90, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .success-overlay .success-icon svg {
      width: 36px;
      height: 36px;
      stroke: var(--color-success);
    }
    .success-overlay .success-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .success-overlay .success-desc {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-top: 8px;
      text-align: center;
      line-height: 1.6;
    }
    .success-overlay .badge-completed {
      margin-top: 16px;
    }
  </style>
</head>
<body style="background-color: #1C1210; color: #F0E6DA;">
  <div class="app-container">
    <div class="page-no-tabs">
      <!-- Top Nav -->
      <div class="top-nav">
        <a class="nav-back" href="blessing-tasks.html" data-dom-id="back-blessing-tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15,18 9,12 15,6"/>
          </svg>
        </a>
        <span class="nav-title">加持任务详情</span>
      </div>

      <div class="page-content" style="padding-bottom: 120px;">
        <!-- Task ID Card -->
        <div class="detail-card fade-in">
          <div class="detail-title">任务信息</div>
          <div class="detail-id">BL20260630001</div>
        </div>

        <!-- User Info Card -->
        <div class="detail-card fade-in">
          <div class="detail-title">用户信息</div>
          <div class="user-info-row">
            <div class="avatar avatar-lg">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="user-detail">
              <div class="user-name">用户·王芳</div>
              <div class="user-phone">139****1234</div>
            </div>
          </div>
        </div>

        <!-- Bracelet Info Card -->
        <div class="detail-card fade-in">
          <div class="detail-title">手串信息</div>
          <div class="bracelet-row">
            <div class="bracelet-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="8" cy="12" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="16" cy="12" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="9.5" cy="9.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="14.5" cy="14.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="14.5" cy="9.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="9.5" cy="14.5" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </div>
            <div class="bracelet-detail">
              <div class="bd-name">紫檀·静心</div>
              <div class="bd-meta">材料：紫檀木 12颗珠</div>
              <div class="bd-price">总价 ¥544</div>
            </div>
          </div>
        </div>

        <!-- Service Card -->
        <div class="detail-card fade-in">
          <div class="detail-title">加持服务</div>
          <div class="service-info">
            <div class="service-row">
              <span class="s-label">服务名称</span>
              <span class="badge badge-accent">灵隐寺·开光加持</span>
            </div>
            <div class="service-row">
              <span class="s-label">服务价格</span>
              <span class="s-value price">¥168</span>
            </div>
            <div class="service-row">
              <span class="s-label">执行法师</span>
              <span class="s-value">智海法师</span>
            </div>
          </div>
        </div>

        <!-- Timeline -->
        <div class="detail-section-title">任务进度</div>
        <div class="timeline fade-in">
          <div class="timeline-item">
            <div class="timeline-dot">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>
            </div>
            <div class="timeline-content">
              <div class="timeline-title">订单创建</div>
              <div class="timeline-time">2026-06-28 10:30</div>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>
            </div>
            <div class="timeline-content">
              <div class="timeline-title">商城制作完成</div>
              <div class="timeline-time">2026-06-30 08:00</div>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>
            </div>
            <div class="timeline-content">
              <div class="timeline-title">分配给智海法师</div>
              <div class="timeline-time">2026-06-30 09:15</div>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot active">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2" fill="currentColor" stroke="none"/></svg>
            </div>
            <div class="timeline-content">
              <div class="timeline-title" style="color: var(--color-brand);">待加持</div>
              <div class="timeline-time">等待法师开始加持...</div>
            </div>
          </div>
        </div>

        <!-- Upload Area (hidden initially) -->
        <div id="upload-section" style="display: none; padding: 16px;">
          <div class="detail-section-title" style="padding: 0 0 12px;">上传加持凭证</div>
          <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17,8 12,3 7,8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <div class="upload-text">点击上传加持照片或视频</div>
            <div class="upload-hint">支持 JPG、PNG、MP4 格式</div>
          </div>
          <input type="file" id="file-input" accept="image/*,video/*" style="display:none;" aria-label="输入">
        </div>

        <!-- Success Overlay (hidden initially) -->
        <div id="success-overlay" class="success-overlay">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20,6 9,17 4,12"/>
            </svg>
          </div>
          <div class="success-title">加持已完成</div>
          <div class="success-desc">手串"紫檀·静心"的开光加持已完成，<br>加持凭证已上传，用户将收到通知。</div>
          <span class="badge badge-success badge-completed" style="font-size: 13px; padding: 5px 12px;">已完成</span>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar" id="action-bar">
        <button class="btn-start" id="btn-start" onclick="startBlessing()">开始加持</button>
      </div>
    </div>
  </div>

  <script>
    function startBlessing() {
      // Hide start button, show complete + upload
      var bar = document.getElementById('action-bar');
      bar.innerHTML = '<button class="btn-complete" onclick="completeBlessing()">完成加持</button>' +
                      '<button class="btn-upload" onclick="document.getElementById(\'file-input\').click()">上传凭证</button>';
      // Show upload section
      document.getElementById('upload-section').style.display = 'block';
      // Scroll to upload
      document.getElementById('upload-section').scrollIntoView({ behavior: 'smooth' });
    }

    function completeBlessing() {
      // Hide action bar
      document.getElementById('action-bar').style.display = 'none';
      // Hide upload section
      document.getElementById('upload-section').style.display = 'none';
      // Show success overlay
      var overlay = document.getElementById('success-overlay');
      overlay.classList.add('show');
      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
