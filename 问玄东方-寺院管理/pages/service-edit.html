  <!-- Content -->
  <main class="content">
    <div class="page-header">
      <div class="page-header-left">
        <div>
          <h2>编辑服务</h2>
          <div class="breadcrumb"><a href="service-list.html">服务管理</a> / 编辑</div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <a href="service-list.html" class="back-link" data-dom-id="back-service-list"
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        返回服务列表
      </a>

      <!-- Basic Info -->
      <div class="card mb-24">
        <div class="card-header"><h3>服务基本信息</h3></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">服务名称 <span class="required">*</span></label>
              <input type="text" class="form-input" value="祈福法会" aria-label="输入">
            </div>
            <div class="form-group">
              <label class="form-label">服务类型 <span class="required">*</span></label>
              <select class="form-select">
                <option selected>祈福</option>
                <option>供灯</option>
                <option>上香</option>
                <option>还愿</option>
                <option>超度</option>
                <option>开光</option>
                <option>化太岁</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">服务描述</label>
            <textarea class="form-textarea" rows="4">祈福法会由寺院高僧主法，为信众祈福消灾、增福增慧。法会期间，法师诵经祈福，信众可在佛前供灯、上香、献花，祈求国泰民安、家庭和睦、身体健康、事业顺利。</textarea>
          </div>
        </div>
      </div>

      <!-- Pricing -->
      <div class="card mb-24">
        <div class="card-header"><h3>价格设置</h3></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">基础价格 <span class="required">*</span></label>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="text-muted">&yen;</span>
              <input type="number" class="form-input" value="200" style="max-width:200px;" aria-label="输入">
              <span class="text-sm text-muted">元/次</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">自定义价位</label>
            <div class="table-wrapper" style="border:none;">
              <table class="price-table">
                <thead>
                  <tr>
                    <th>档位名称</th>
                    <th>价格</th>
                    <th>说明</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><input type="text" class="form-input" value="普通祈福" aria-label="输入"></td>
                    <td><input type="text" class="form-input" value="¥200" aria-label="输入"></td>
                    <td><input type="text" class="form-input" value="基本祈福仪式" aria-label="输入"></td>
                    <td><button class="btn btn-sm btn-ghost text-danger">删除</button></td>
                  </tr>
                  <tr>
                    <td><input type="text" class="form-input" value="精致祈福" aria-label="输入"></td>
                    <td><input type="text" class="form-input" value="¥500" aria-label="输入"></td>
                    <td><input type="text" class="form-input" value="含供灯+祈福牌位" aria-label="输入"></td>
                    <td><button class="btn btn-sm btn-ghost text-danger">删除</button></td>
                  </tr>
                  <tr>
                    <td><input type="text" class="form-input" value="至尊祈福" aria-label="输入"></td>
                    <td><input type="text" class="form-input" value="¥1000" aria-label="输入"></td>
                    <td><input type="text" class="form-input" value="独享法师+全家祈福" aria-label="输入"></td>
                    <td><button class="btn btn-sm btn-ghost text-danger">删除</button></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <button class="btn btn-sm btn-outline mt-12">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              添加价位档
            </button>
          </div>
        </div>
      </div>

      <!-- Time Template -->
      <div class="card mb-24">
        <div class="card-header"><h3>时段模板</h3></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">服务时长</label>
              <div style="display:flex; align-items:center; gap:8px;">
                <input type="number" class="form-input" value="60" style="max-width:120px;" aria-label="输入">
                <span class="text-muted">分钟</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">每日可预约时段</label>
              <div class="form-row" style="gap:8px;">
                <input type="time" class="form-input" value="08:00" aria-label="输入">
                <span class="text-muted" style="display:flex;align-items:center;">至</span>
                <input type="time" class="form-input" value="17:00" aria-label="输入">
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">可用日期</label>
            <div class="tags-container">
              <span class="tag" style="cursor:pointer;">周一 <span class="tag-close">&times;</span></span>
              <span class="tag" style="cursor:pointer;">周二 <span class="tag-close">&times;</span></span>
              <span class="tag" style="cursor:pointer;">周三 <span class="tag-close">&times;</span></span>
              <span class="tag" style="cursor:pointer;">周四 <span class="tag-close">&times;</span></span>
              <span class="tag" style="cursor:pointer;">周五 <span class="tag-close">&times;</span></span>
              <span class="tag" style="cursor:pointer;">周六 <span class="tag-close">&times;</span></span>
              <span class="tag" style="cursor:pointer;">周日 <span class="tag-close">&times;</span></span>
            </div>
            <div class="form-hint">点击标签可取消选择，取消后该日不可预约此服务</div>
          </div>
        </div>
      </div>

      <!-- Linked Masters -->
      <div class="card mb-24">
        <div class="card-header"><h3>关联法师</h3></div>
        <div class="card-body">
          <div class="grid-3" style="gap:12px;">
            <label class="form-check" style="padding:12px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer;">
              <input type="checkbox" checked aria-label="输入">
              <div class="user-cell">
                <div class="user-cell-avatar" style="background:#C45A3C20; color:#C45A3C;">智</div>
                <div class="user-cell-info">
                  <div class="user-cell-name">智海法师</div>
                  <div class="user-cell-sub">住持 / 汉传佛教 / 灵隐寺</div>
                </div>
              </div>
            </label>
            <label class="form-check" style="padding:12px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer;">
              <input type="checkbox" checked aria-label="输入">
              <div class="user-cell">
                <div class="user-cell-avatar" style="background:#5B7AAA20; color:#5B7AAA;">延</div>
                <div class="user-cell-info">
                  <div class="user-cell-name">释延心法师</div>
                  <div class="user-cell-sub">首座 / 禅宗 / 少林寺</div>
                </div>
              </div>
            </label>
            <label class="form-check" style="padding:12px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer;">
              <input type="checkbox" aria-label="输入">
              <div class="user-cell">
                <div class="user-cell-avatar" style="background:#5B8C5A20; color:#5B8C5A;">清</div>
                <div class="user-cell-info">
                  <div class="user-cell-name">清风道长</div>
                  <div class="user-cell-sub">监院 / 全真道派 / 白云观</div>
                </div>
              </div>
            </label>
            <label class="form-check" style="padding:12px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer;">
              <input type="checkbox" aria-label="输入">
              <div class="user-cell">
                <div class="user-cell-avatar" style="background:#C8A96E20; color:#C8A96E;">扎</div>
                <div class="user-cell-info">
                  <div class="user-cell-name">扎西多吉活佛</div>
                  <div class="user-cell-sub">活佛 / 藏密佛教 / 大昭寺</div>
                </div>
              </div>
            </label>
            <label class="form-check" style="padding:12px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer;">
              <input type="checkbox" aria-label="输入">
              <div class="user-cell">
                <div class="user-cell-avatar" style="background:#D4A03020; color:#D4A030;">慧</div>
                <div class="user-cell-info">
                  <div class="user-cell-name">慧明法师</div>
                  <div class="user-cell-sub">副住持 / 汉传佛教 / 普陀山</div>
                </div>
              </div>
            </label>
            <label class="form-check" style="padding:12px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer;">
              <input type="checkbox" aria-label="输入">
              <div class="user-cell">
                <div class="user-cell-avatar" style="background:#9A8A7A20; color:#9A8A7A;">真</div>
                <div class="user-cell-info">
                  <div class="user-cell-name">真武道长</div>
                  <div class="user-cell-sub">知客 / 正一派 / 武当山</div>
                </div>
              </div>
            </label>
          </div>
        </div>
      </div>

      <!-- Images -->
      <div class="card mb-24">
        <div class="card-header"><h3>服务图片</h3></div>
        <div class="card-body">
          <div class="upload-grid" style="grid-template-columns: repeat(3,1fr);">
            <div class="upload-box has-image" style="background: linear-gradient(135deg, #C45A3C 0%, #D47A5E 100%); aspect-ratio:4/3;">
              <span style="color:#fff; font-size:12px;">法会主图</span>
            </div>
            <div class="upload-box has-image" style="background: linear-gradient(135deg, #C8A96E 0%, #A08040 100%); aspect-ratio:4/3;">
              <span style="color:#fff; font-size:12px;">祈福场景</span>
            </div>
            <div class="upload-box" style="aspect-ratio:4/3;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              <span>上传图片</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn btn-outline">取消</button>
        <button class="btn btn-primary">保存修改</button>
      </div>
    </div>
  </main>
</body>
</html>
