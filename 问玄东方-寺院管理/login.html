<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 寺院管理台</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-decoration"></div>
    <div class="login-decoration"></div>
    <div class="login-decoration"></div>

    <div class="login-card">
      <div class="login-logo">
        <h1>问玄东方</h1>
        <p>寺院管理台</p>
      </div>

      <form class="login-form" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input type="tel" class="form-input" placeholder="请输入手机号" value="138****6789" aria-label="请输入手机号">
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="请输入密码" value="••••••••" aria-label="请输入密码">
        </div>

        <button type="submit" class="login-btn" data-dom-id="cta-login"  onclick="window.location.href='pages/dashboard.html'">登 录</button>

        <div class="login-options">
          <label class="form-check">
            <input type="checkbox" checked aria-label="输入"> 记住登录
          </label>
          <a href="forgot-password.html">忘记密码?</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
