<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
<meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问玄东方 - 平台管理台</title>
<link rel="stylesheet" href="platform-admin.css">
<style>
body { overflow: hidden; }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-icon">&#x1F6E1;</div>
      <h1>问玄东方</h1>
      <p class="login-subtitle">管理员登录</p>
    </div>
    <form class="login-form" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label">账号</label>
        <input type="text" class="form-input" placeholder="请输入管理员账号" aria-label="请输入管理员账号">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="请输入密码" aria-label="请输入密码">
      </div>
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="captcha-row">
          <input type="text" class="form-input" placeholder="请输入验证码" aria-label="请输入验证码">
          <div class="captcha-img">A7x2</div>
        </div>
      </div>
      <a href="pages/dashboard.html"  type="submit" class="login-btn" data-dom-id="cta-login">登 录</a>
    </form>
  </div>
</div>
</body>
</html>
