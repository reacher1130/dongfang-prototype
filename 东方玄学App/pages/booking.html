<!DOCTYPE html>
<html lang="zh-CN"><style>html{color-scheme:dark}</style>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1C1210">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>预约服务 - 东方玄学</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Brand CSS -->
  <link rel="stylesheet" href="../colors_and_type.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-primary': '#1C1210',
            'bg-secondary': '#2A1E1A',
            'bg-tertiary': '#3A2C25',
            'brand': '#C45A3C',
            'brand-light': '#D4735A',
            'brand-dark': '#A64830',
            'accent': '#C8A96E',
            'accent-light': '#D4BC8A',
            'accent-dark': '#A88A50',
            'cinnabar': '#B5453A',
            'text-primary': '#F0E6DA',
            'text-secondary': '#C5B097',
            'text-tertiary': '#8A7A6A',
          },
          fontFamily: {
            serif: ['Noto Serif SC', 'STSong', 'SimSun', 'serif'],
            sans: ['Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      max-width: 430px;
      margin: 0 auto;
      background-color: #1C1210;
      color: #F0E6DA;
      padding-bottom: 100px;
    }

    /* Service card radio styles */
    .service-card {
      background: #2A1E1A;
      border: 1px solid rgba(200, 169, 110, 0.15);
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .service-card.selected {
      border: 2px solid #C45A3C;
      background: rgba(196, 90, 60, 0.08);
    }

    /* Date pill */
    .date-pill {
      flex-shrink: 0;
      width: 60px;
      padding: 10px 4px;
      border-radius: 8px;
      background: #2A1E1A;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s ease;
      border: 1px solid transparent;
    }
    .date-pill.selected {
      background: #C45A3C;
      border-color: #C45A3C;
    }
    .date-pill.selected .date-label { color: #F0E6DA; }
    .date-pill.selected .date-num { color: #FFFFFF; }

    /* Time slot */
    .time-slot {
      flex: 1;
      padding: 12px 8px;
      border-radius: 8px;
      background: #2A1E1A;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s ease;
      border: 1px solid rgba(200, 169, 110, 0.15);
    }
    .time-slot.selected {
      border: 1px solid #C45A3C;
      background: rgba(196, 90, 60, 0.08);
    }

    /* Merit amount button */
    .merit-btn {
      flex: 1;
      height: 40px;
      border-radius: 8px;
      background: #2A1E1A;
      border: 1px solid rgba(200, 169, 110, 0.15);
      color: #C5B097;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .merit-btn.selected {
      background: #C45A3C;
      border-color: #C45A3C;
      color: #FFFFFF;
    }

    /* Textarea custom */
    textarea::placeholder {
      color: #8A7A6A;
    }
    textarea {
      font-family: 'Noto Sans SC', sans-serif;
    }
  </style>
</head>

<body>
  <!-- ===== 1. Top Navigation Bar ===== -->
  <header class="top-nav" style="justify-content: center; position: sticky; top: 0; z-index: 50;">
    <!-- Back Arrow -->
    <a href="javascript:void(0)" data-dom-id="back-home" class="absolute left-4 top-1/2 -translate-y-1/2" style="width: 24px; height: 24px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 19L8 12L15 5" stroke="#C8A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <!-- Title -->
    <h1 class="text-base" style="font-size: 17px; font-weight: 600; color: #C8A96E;">预约服务</h1>
  </header>

  <!-- ===== 2. Service Summary Card ===== -->
  <section style="padding: 16px;">
    <div class="card" style="background: #2A1E1A; border-radius: 12px; padding: 16px; border: 1px solid rgba(200,169,110,0.15); display: flex; align-items: center; gap: 12px;">
      <!-- Avatar -->
      <img src="../assets/master-avatar-shimingyuan.jpg" alt="释明远法师"
           style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid #C8A96E; flex-shrink: 0;" width="56" height="56">
      <!-- Info Column -->
      <div style="flex: 1; min-width: 0;">
        <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
          <span style="font-size: 16px; font-weight: 600; color: #F0E6DA;">释明远法师</span>
        </div>
        <div style="font-size: 13px; color: #8A7A6A; margin-top: 2px;">少林寺 · 方丈</div>
        <div style="display: flex; align-items: center; gap: 8px; margin-top: 6px;">
          <span style="display: inline-block; padding: 2px 10px; border-radius: 9999px; background: #C45A3C; color: #FFFFFF; font-size: 12px; font-weight: 500;">禅修指导</span>
          <span style="font-size: 13px; color: #C8A96E; display: flex; align-items: center; gap: 2px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#C8A96E" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
            </svg>
            4.9
          </span>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 3. Service Selection ===== -->
  <section style="padding: 0 16px;">
    <h2 style="font-size: 15px; font-weight: 600; color: #F0E6DA; margin-bottom: 12px;">选择服务项目</h2>

    <div style="display: flex; flex-direction: column; gap: 10px;">
      <!-- Card 1: Selected -->
      <div class="service-card selected" data-dom-id="service-1">
        <!-- Radio indicator -->
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" style="flex-shrink: 0;">
          <circle cx="11" cy="11" r="10" stroke="#C45A3C" stroke-width="2"/>
          <circle cx="11" cy="11" r="5" fill="#C45A3C"/>
        </svg>
        <!-- Info -->
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 15px; font-weight: 500; color: #F0E6DA;">禅修指导</div>
          <div style="font-size: 13px; color: #8A7A6A; margin-top: 2px;">30分钟</div>
        </div>
        <!-- Price -->
        <div style="font-size: 15px; font-weight: 600; color: #C45A3C; flex-shrink: 0;">¥388<span style="font-size: 12px; font-weight: 400; color: #8A7A6A;">/次</span></div>
      </div>

      <!-- Card 2 -->
      <div class="service-card" data-dom-id="service-2">
        <!-- Radio indicator (empty) -->
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" style="flex-shrink: 0;">
          <circle cx="11" cy="11" r="10" stroke="#8A7A6A" stroke-width="2"/>
        </svg>
        <!-- Info -->
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 15px; font-weight: 500; color: #F0E6DA;">祈福法事</div>
          <div style="font-size: 13px; color: #8A7A6A; margin-top: 2px;">60分钟</div>
        </div>
        <!-- Price -->
        <div style="font-size: 15px; font-weight: 600; color: #C45A3C; flex-shrink: 0;">¥588<span style="font-size: 12px; font-weight: 400; color: #8A7A6A;">/次</span></div>
      </div>

      <!-- Card 3 -->
      <div class="service-card" data-dom-id="service-3">
        <!-- Radio indicator (empty) -->
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" style="flex-shrink: 0;">
          <circle cx="11" cy="11" r="10" stroke="#8A7A6A" stroke-width="2"/>
        </svg>
        <!-- Info -->
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 15px; font-weight: 500; color: #F0E6DA;">开光加持</div>
          <div style="font-size: 13px; color: #8A7A6A; margin-top: 2px;">20分钟</div>
        </div>
        <!-- Price -->
        <div style="font-size: 15px; font-weight: 600; color: #C45A3C; flex-shrink: 0;">¥268<span style="font-size: 12px; font-weight: 400; color: #8A7A6A;">/次</span></div>
      </div>
    </div>
  </section>

  <!-- ===== 4. Date/Time Selection ===== -->
  <section style="padding: 0 16px; margin-top: 20px;">
    <h2 style="font-size: 15px; font-weight: 600; color: #F0E6DA; margin-bottom: 12px;">选择预约时间</h2>

    <!-- Date Pills (horizontal scroll) -->
    <div class="scroll-h" style="display: flex; gap: 8px; margin-bottom: 14px; padding-bottom: 4px;">
      <!-- Today (selected) -->
      <div class="date-pill selected" data-dom-id="date-today">
        <div class="date-label" style="font-size: 12px; color: rgba(255,255,255,0.7);">今天</div>
        <div class="date-num" style="font-size: 16px; font-weight: 600; color: #FFFFFF; margin-top: 4px;">6.27</div>
      </div>
      <!-- Tomorrow -->
      <div class="date-pill" data-dom-id="date-tomorrow">
        <div class="date-label" style="font-size: 12px; color: #8A7A6A;">明天</div>
        <div class="date-num" style="font-size: 16px; font-weight: 600; color: #C5B097; margin-top: 4px;">6.28</div>
      </div>
      <!-- 周日 -->
      <div class="date-pill" data-dom-id="date-sun">
        <div class="date-label" style="font-size: 12px; color: #8A7A6A;">周日</div>
        <div class="date-num" style="font-size: 16px; font-weight: 600; color: #C5B097; margin-top: 4px;">6.29</div>
      </div>
      <!-- 周一 -->
      <div class="date-pill" data-dom-id="date-mon">
        <div class="date-label" style="font-size: 12px; color: #8A7A6A;">周一</div>
        <div class="date-num" style="font-size: 16px; font-weight: 600; color: #C5B097; margin-top: 4px;">6.30</div>
      </div>
      <!-- 周二 -->
      <div class="date-pill" data-dom-id="date-tue">
        <div class="date-label" style="font-size: 12px; color: #8A7A6A;">周二</div>
        <div class="date-num" style="font-size: 16px; font-weight: 600; color: #C5B097; margin-top: 4px;">7.1</div>
      </div>
      <!-- 周三 -->
      <div class="date-pill" data-dom-id="date-wed">
        <div class="date-label" style="font-size: 12px; color: #8A7A6A;">周三</div>
        <div class="date-num" style="font-size: 16px; font-weight: 600; color: #C5B097; margin-top: 4px;">7.2</div>
      </div>
      <!-- 周四 -->
      <div class="date-pill" data-dom-id="date-thu">
        <div class="date-label" style="font-size: 12px; color: #8A7A6A;">周四</div>
        <div class="date-num" style="font-size: 16px; font-weight: 600; color: #C5B097; margin-top: 4px;">7.3</div>
      </div>
    </div>

    <!-- Time Slots -->
    <div style="display: flex; gap: 8px;">
      <!-- 上午 (selected) -->
      <div class="time-slot selected" data-dom-id="time-morning">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="margin: 0 auto 4px;">
          <circle cx="12" cy="12" r="5" stroke="#C45A3C" stroke-width="2"/>
          <path d="M12 2V4M12 20V22M4.93 4.93L6.34 6.34M17.66 17.66L19.07 19.07M2 12H4M20 12H22M4.93 19.07L6.34 17.66M17.66 6.34L19.07 4.93" stroke="#C45A3C" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div style="font-size: 13px; font-weight: 500; color: #F0E6DA;">上午</div>
        <div style="font-size: 11px; color: #C45A3C; margin-top: 2px;">9:00-12:00</div>
      </div>
      <!-- 下午 -->
      <div class="time-slot" data-dom-id="time-afternoon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="margin: 0 auto 4px;">
          <circle cx="12" cy="12" r="5" stroke="#C8A96E" stroke-width="2"/>
          <path d="M12 6V12L16 14" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div style="font-size: 13px; font-weight: 500; color: #C5B097;">下午</div>
        <div style="font-size: 11px; color: #8A7A6A; margin-top: 2px;">14:00-17:00</div>
      </div>
      <!-- 晚上 -->
      <div class="time-slot" data-dom-id="time-evening">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="margin: 0 auto 4px;">
          <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke="#C8A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div style="font-size: 13px; font-weight: 500; color: #C5B097;">晚上</div>
        <div style="font-size: 11px; color: #8A7A6A; margin-top: 2px;">19:00-21:00</div>
      </div>
    </div>
  </section>

  <!-- ===== 5. Remark Input ===== -->
  <section style="padding: 0 16px; margin-top: 20px;">
    <h2 style="font-size: 15px; font-weight: 600; color: #F0E6DA; margin-bottom: 12px;">备注说明（选填）</h2>
    <textarea data-dom-id="remark-input"
              placeholder="请描述您的需求或祈福对象..."
              style="width: 100%; height: 80px; background: #2A1E1A; border: 1px solid rgba(200,169,110,0.15); border-radius: 8px; padding: 12px; color: #F0E6DA; font-size: 14px; resize: none; outline: none;
      &:focus-visible { outline: 2px solid #C8A96E; outline-offset: 2px; } line-height: 1.6;"></textarea>
  </section>

  <!-- ===== 6. Merit/Donation Section ===== -->
  <section style="padding: 0 16px; margin-top: 20px;">
    <h2 style="font-size: 15px; font-weight: 600; color: #F0E6DA; margin-bottom: 12px;">随喜功德（选填）</h2>

    <!-- Amount Buttons -->
    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
      <div class="merit-btn" data-dom-id="merit-0">¥0</div>
      <div class="merit-btn" data-dom-id="merit-50">¥50</div>
      <div class="merit-btn selected" data-dom-id="merit-100">¥100</div>
      <div class="merit-btn" data-dom-id="merit-200">¥200</div>
    </div>

    <!-- Custom Input -->
    <div style="display: flex; align-items: center; background: #2A1E1A; border: 1px solid rgba(200,169,110,0.15); border-radius: 8px; padding: 0 12px; height: 44px;">
      <span style="font-size: 14px; color: #8A7A6A; margin-right: 6px;">¥</span>
      <input type="text" data-dom-id="custom-merit-input" placeholder="自定义金额"
             style="flex: 1; background: transparent; border: none; outline: none;
      &:focus-visible { outline: 2px solid #C8A96E; outline-offset: 2px; } color: #F0E6DA; font-size: 14px; font-family: 'Noto Sans SC', sans-serif;" aria-label="自定义金额">
    </div>
  </section>

  <!-- ===== 7. Price Summary ===== -->
  <section style="padding: 16px; margin-top: 16px;">
    <div style="background: #2A1E1A; border-radius: 8px; padding: 16px; border: 1px solid rgba(200,169,110,0.15);">
      <!-- Row 1: 服务费用 -->
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0;">
        <span style="font-size: 14px; color: #C5B097;">服务费用</span>
        <span style="font-size: 14px; color: #F0E6DA;">¥388</span>
      </div>
      <!-- Row 2: 随喜功德 -->
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0;">
        <span style="font-size: 14px; color: #C5B097;">随喜功德</span>
        <span style="font-size: 14px; color: #C8A96E;">¥100</span>
      </div>
      <!-- Divider -->
      <div style="height: 1px; background: rgba(200,169,110,0.15); margin: 10px 0;"></div>
      <!-- Row 3: 合计 -->
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0;">
        <span style="font-size: 15px; font-weight: 600; color: #F0E6DA;">合计</span>
        <span style="font-size: 20px; font-weight: 700; color: #C45A3C;">¥488</span>
      </div>
      <!-- Note -->
      <div style="font-size: 12px; color: #8A7A6A; margin-top: 10px; text-align: center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="vertical-align: middle; margin-right: 2px; margin-top: -1px;">
          <circle cx="12" cy="12" r="10" stroke="#8A7A6A" stroke-width="1.5"/>
          <path d="M12 16V12M12 8H12.01" stroke="#8A7A6A" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        预约成功后24小时内可免费取消
      </div>
    </div>
  </section>

  <!-- Spacer for fixed bottom CTA -->
  <div style="height: 24px;"></div>

  <!-- ===== 8. Fixed Bottom CTA ===== -->
  <div style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 16px)); background: rgba(28, 18, 16, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(200,169,110,0.15);">
    <div style="max-width: 430px; margin: 0 auto;">
      <button data-dom-id="confirm-pay" style="width: 100%; height: 52px; background: #B5453A; color: #FFFFFF; font-size: 17px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s, color 0.2s, border-color 0.2s, opacity 0.2s ease; letter-spacing: 0.5px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="5" width="20" height="14" rx="2" stroke="white" stroke-width="2"/>
          <path d="M2 10H22" stroke="white" stroke-width="2"/>
        </svg>
        确认预约并支付 ¥488
      </button>
    </div>
  </div>

  <!-- ===== Interactive Logic (visual only, no real backend) ===== -->
  <script>
    // Service card selection (radio behavior)
    document.querySelectorAll('.service-card').forEach(card => {
      card.addEventListener('click', function() {
        document.querySelectorAll('.service-card').forEach(c => {
          c.classList.remove('selected');
          const radio = c.querySelector('svg');
          if (radio) {
            radio.innerHTML = '<circle cx="11" cy="11" r="10" stroke="#8A7A6A" stroke-width="2"/>';
          }
        });
        this.classList.add('selected');
        const myRadio = this.querySelector('svg');
        if (myRadio) {
          myRadio.innerHTML = '<circle cx="11" cy="11" r="10" stroke="#C45A3C" stroke-width="2"/><circle cx="11" cy="11" r="5" fill="#C45A3C"/>';
        }
      });
    });

    // Date pill selection
    document.querySelectorAll('.date-pill').forEach(pill => {
      pill.addEventListener('click', function() {
        document.querySelectorAll('.date-pill').forEach(p => {
          p.classList.remove('selected');
          const label = p.querySelector('.date-label');
          const num = p.querySelector('.date-num');
          if (label) label.style.color = '#8A7A6A';
          if (num) num.style.color = '#C5B097';
        });
        this.classList.add('selected');
        const label = this.querySelector('.date-label');
        const num = this.querySelector('.date-num');
        if (label) label.style.color = 'rgba(255,255,255,0.7)';
        if (num) num.style.color = '#FFFFFF';
      });
    });

    // Time slot selection
    document.querySelectorAll('.time-slot').forEach(slot => {
      slot.addEventListener('click', function() {
        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
        this.classList.add('selected');
      });
    });

    // Merit amount selection
    document.querySelectorAll('.merit-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.merit-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
      });
    });
  </script>
</body>
</html>
